<body>
  <!-- Elegant Preloader -->
  <div id="insane-preloader">
    <div class="preloader-content">
      <div class="loader-container">
        <div class="loader-ring"></div>
        <div class="loader-logo">JLS<span>'27</span></div>
      </div>
      <div class="loader-text">Seniors</div>
      <div class="loader-subtext">Loading Memories...</div>
    </div>
  </div>

  <app-root></app-root>

  <script>
    AOS.init({
      duration: 1000,
      once: true,
      offset: 100,
      easing: 'ease-out-cubic'
    });

    const refreshAOS = () => {
      if (window.AOS && typeof window.AOS.refresh === 'function') {
        window.AOS.refresh();
      }
    };

    const fireLocationChange = () => window.dispatchEvent(new Event('locationchange'));

    const originalPushState = history.pushState;
    const originalReplaceState = history.replaceState;

    history.pushState = function () {
      const result = originalPushState.apply(this, arguments);
      fireLocationChange();
      return result;
    };

    history.replaceState = function () {
      const result = originalReplaceState.apply(this, arguments);
      fireLocationChange();
      return result;
    };

    window.addEventListener('popstate', refreshAOS);
    window.addEventListener('locationchange', refreshAOS);

    // Function to hide the preloader
    const hidePreloader = () => {
      const preloader = document.getElementById('insane-preloader');

      if (preloader && !preloader.classList.contains('loaded')) {
        preloader.classList.add('loaded');

        // wait for split animation
        setTimeout(() => preloader.remove(), 1200);
      }
    };

    // Remove preloader after fully loaded
    window.addEventListener('load', function () {
      setTimeout(hidePreloader, 1200);
    });

    // Failsafe
    setTimeout(hidePreloader, 6000);
  </script>
</body>
